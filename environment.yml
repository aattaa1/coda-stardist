name: coda-stardist
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.10
  
  # CUDA/GPU support
  - cudatoolkit=11.8
  - cudnn=8.9
  
  # Core scientific packages
  - numpy=1.24.4
  - pandas>=2.0
  - scipy>=1.10
  
  # Image processing
  - opencv>=4.6
  - scikit-image>=0.21
  - pillow>=10.0
  - tifffile>=2023.0
  
  # HDF5 support
  - hdf5>=1.12
  - h5py>=3.8
  
  # Jupyter
  - jupyterlab>=4.0
  - ipykernel>=6.0
  
  # Pip packages
  - pip
  - pip:
      # Deep learning
      - tensorflow-gpu==2.10.0
      - keras==2.10.0
      
      # StarDist and dependencies
      - stardist>=0.8.5
      - csbdeep>=0.7.4
      
      # Whole slide image support
      - openslide-bin==4.0.0.11
      - openslide-python==1.4.3
      
      # GeoJSON and geometry
      - geojson>=3.0.0
      - shapely>=2.0.0
      - orjson
      
      # Visualization
      - matplotlib>=3.7.0
      - seaborn>=0.12.0
      
      # Progress tracking
      - tqdm>=4.65.0

      # Image Augmentation
      - augmend>=0.1.0

